<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WhatsText — $month_label</title>
    <script>(function(){
        var t=localStorage.getItem("whatstext-theme");if(!t){t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";}document.documentElement.setAttribute("data-theme",t);
        var p=localStorage.getItem("whatstext-profanity-filter")||"off";document.documentElement.setAttribute("data-profanity-filter",p);
    })();</script>
    <link rel="stylesheet" href="$static_prefix/style.css">
</head>
<body class="chat-page">
    <header class="topbar">
        <span class="app-title">WhatsText</span>
        <span class="month-label">$month_label</span>
        <button id="profanity-toggle" type="button" aria-label="Toggle profanity filter" aria-pressed="false">🤬</button>
        <button id="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
    </header>

    <main class="chat-container">
        $content
    </main>

    <nav class="page-nav">
        <span class="page-nav-prev">$prev_link</span>
        <span class="page-nav-next">$next_link</span>
    </nav>

    <script src="$static_prefix/script.js"></script>
</body>
</html>
